name: Deploy Rick's Portfolio to AWS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual triggers

env:
  AWS_REGION: us-west-1
  S3_BUCKET: rick-portfolio-2025
  LAMBDA_FUNCTION_NAME: rick-portfolio-contact
  # Custom domain configuration
  CUSTOM_DOMAIN: rickrothbart.com
  CLOUDFRONT_DISTRIBUTION_ID: E3HT67NT39EUN4

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Prepare static files
      run: |
        # Copy main HTML file to index.html for deployment
        cp rickrothbart.html index.html
        
        # List files to be deployed
        echo "Files to deploy:"
        ls -la *.html *.css *.js *.jpg *.png *.svg *.ico *.webmanifest 2>/dev/null || true

    - name: Deploy static files to S3
      run: |
        # Configure bucket for static website hosting (if not already configured)
        aws s3 website s3://${{ env.S3_BUCKET }} --index-document index.html --error-document index.html || echo "Website hosting already configured"
        
        # Set bucket policy for public read access
        aws s3api put-bucket-policy --bucket ${{ env.S3_BUCKET }} --policy '{
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "PublicReadGetObject",
              "Effect": "Allow",
              "Principal": "*",
              "Action": "s3:GetObject",
              "Resource": "arn:aws:s3:::'${{ env.S3_BUCKET }}'/*"
            }
          ]
        }' || echo "Bucket policy already set"
        
        # Upload static files with proper content types
        aws s3 cp index.html s3://${{ env.S3_BUCKET }}/index.html --content-type "text/html"
        aws s3 cp styles.css s3://${{ env.S3_BUCKET }}/styles.css --content-type "text/css"
        aws s3 cp script.js s3://${{ env.S3_BUCKET }}/script.js --content-type "application/javascript"
        
        # Upload images
        aws s3 cp rick.jpg s3://${{ env.S3_BUCKET }}/rick.jpg --content-type "image/jpeg" || echo "rick.jpg not found"
        aws s3 cp laney.png s3://${{ env.S3_BUCKET }}/laney.png --content-type "image/png" || echo "laney.png not found"
        aws s3 cp "Noya Logo Vertical.png" s3://${{ env.S3_BUCKET }}/"Noya Logo Vertical.png" --content-type "image/png" || echo "Noya logo not found"
        aws s3 cp orbital.svg s3://${{ env.S3_BUCKET }}/orbital.svg --content-type "image/svg+xml" || echo "orbital.svg not found"
        
        # Upload favicon files
        aws s3 cp favicon.ico s3://${{ env.S3_BUCKET }}/favicon.ico --content-type "image/x-icon" || echo "favicon.ico not found"
        aws s3 cp favicon.svg s3://${{ env.S3_BUCKET }}/favicon.svg --content-type "image/svg+xml" || echo "favicon.svg not found"
        aws s3 cp apple-touch-icon.svg s3://${{ env.S3_BUCKET }}/apple-touch-icon.svg --content-type "image/svg+xml" || echo "apple-touch-icon.svg not found"
        aws s3 cp site.webmanifest s3://${{ env.S3_BUCKET }}/site.webmanifest --content-type "application/manifest+json" || echo "site.webmanifest not found"

        echo "✅ Static files deployed to S3"

    - name: Deploy BBQ cook-clock app to /bbq/
      run: |
        if [ -d bbq ]; then
          # Sync the pre-built app (content types inferred from file extensions).
          # config.json is written by the board-lambda step below — never delete it.
          aws s3 sync bbq/ s3://${{ env.S3_BUCKET }}/bbq/ --delete --exclude "config.json"

          # Also serve the app at the extensionless /bbq key so the path
          # resolves whether or not the origin handles directory indexes
          aws s3 cp bbq/index.html s3://${{ env.S3_BUCKET }}/bbq --content-type "text/html"

          echo "✅ BBQ app deployed to /bbq/"
        else
          echo "No bbq/ directory found, skipping"
        fi

    - name: Deploy Crossword app to /crossword/
      run: |
        if [ -d crossword ]; then
          # Sync the pre-built app (content types inferred from file extensions).
          aws s3 sync crossword/ s3://${{ env.S3_BUCKET }}/crossword/ --delete

          # Also serve the app at the extensionless /crossword key so the path
          # resolves whether or not the origin handles directory indexes
          aws s3 cp crossword/index.html s3://${{ env.S3_BUCKET }}/crossword --content-type "text/html"

          echo "✅ Crossword app deployed to /crossword/"
        else
          echo "No crossword/ directory found, skipping"
        fi

    - name: Deploy Colorku app to /colorku/
      run: |
        if [ -d colorku ]; then
          # Sync the pre-built app (content types inferred from file extensions).
          # config.json is written by the colorku-board step below — never delete it.
          aws s3 sync colorku/ s3://${{ env.S3_BUCKET }}/colorku/ --delete --exclude "config.json"

          # Also serve the app at the extensionless /colorku key so the path
          # resolves whether or not the origin handles directory indexes
          aws s3 cp colorku/index.html s3://${{ env.S3_BUCKET }}/colorku --content-type "text/html"

          echo "✅ Colorku app deployed to /colorku/"
        else
          echo "No colorku/ directory found, skipping"
        fi

    - name: Deploy MakeItRain (GiffyRain) app to /makeitrain/
      run: |
        if [ -d makeitrain ]; then
          # Sync the single-file app (content types inferred from file extensions).
          aws s3 sync makeitrain/ s3://${{ env.S3_BUCKET }}/makeitrain/ --delete

          # Also serve the app at the extensionless /makeitrain key so the path
          # resolves whether or not the origin handles directory indexes
          aws s3 cp makeitrain/index.html s3://${{ env.S3_BUCKET }}/makeitrain --content-type "text/html"

          echo "✅ MakeItRain app deployed to /makeitrain/"
        else
          echo "No makeitrain/ directory found, skipping"
        fi

    - name: Deploy BBQ shared-board backend (Lambda + DynamoDB)
      run: |
        if [ ! -d board-lambda ]; then echo "No board-lambda/, skipping"; exit 0; fi

        TABLE_NAME=rick-bbq-board
        FN_NAME=rick-bbq-board
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/rick-portfolio-lambda-role"

        # 1) DynamoDB table (idempotent)
        aws dynamodb create-table \
          --table-name $TABLE_NAME \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --region ${{ env.AWS_REGION }} 2>/dev/null && \
          aws dynamodb wait table-exists --table-name $TABLE_NAME --region ${{ env.AWS_REGION }} || \
          echo "Table already exists"

        # 2) Let the existing lambda role touch this one table
        aws iam put-role-policy \
          --role-name rick-portfolio-lambda-role \
          --policy-name bbq-board-dynamodb \
          --policy-document '{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": ["dynamodb:Query", "dynamodb:UpdateItem", "dynamodb:BatchWriteItem"],
              "Resource": "arn:aws:dynamodb:${{ env.AWS_REGION }}:'${ACCOUNT_ID}':table/'$TABLE_NAME'"
            }]
          }'

        # 3) Lambda (no deps — AWS SDK v3 ships with the runtime)
        cd board-lambda
        zip -r deployment.zip board.mjs

        if aws lambda get-function --function-name $FN_NAME --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
          aws lambda update-function-code --function-name $FN_NAME \
            --zip-file fileb://deployment.zip --region ${{ env.AWS_REGION }}
        else
          aws lambda create-function \
            --function-name $FN_NAME \
            --runtime nodejs20.x \
            --role $ROLE_ARN \
            --handler board.handler \
            --zip-file fileb://deployment.zip \
            --timeout 10 \
            --region ${{ env.AWS_REGION }}
        fi

        aws lambda wait function-updated --function-name $FN_NAME --region ${{ env.AWS_REGION }}

        aws lambda update-function-configuration \
          --function-name $FN_NAME \
          --environment "Variables={TABLE_NAME=$TABLE_NAME}" \
          --region ${{ env.AWS_REGION }}
        aws lambda wait function-updated --function-name $FN_NAME --region ${{ env.AWS_REGION }}

        # 4) Public function URL (idempotent) + open invoke permission for it
        aws lambda create-function-url-config \
          --function-name $FN_NAME \
          --auth-type NONE \
          --cors 'AllowOrigins=*,AllowMethods=*,AllowHeaders=content-type' \
          --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Function URL already exists"

        aws lambda add-permission \
          --function-name $FN_NAME \
          --statement-id FunctionURLAllowPublicAccess \
          --action lambda:InvokeFunctionUrl \
          --principal "*" \
          --function-url-auth-type NONE \
          --region ${{ env.AWS_REGION }} 2>/dev/null || echo "URL permission already set"

        BOARD_URL=$(aws lambda get-function-url-config \
          --function-name $FN_NAME --region ${{ env.AWS_REGION }} \
          --query 'FunctionUrl' --output text)
        echo "Board URL: $BOARD_URL"

        # 5) Publish the URL where the app discovers it
        echo "{\"boardUrl\": \"$BOARD_URL\"}" > config.json
        aws s3 cp config.json s3://${{ env.S3_BUCKET }}/bbq/config.json \
          --content-type "application/json" --cache-control "no-cache"

        echo "✅ BBQ shared board deployed"

    - name: Deploy Colorku shared-board backend (Lambda + DynamoDB)
      run: |
        if [ ! -d colorku-lambda ]; then echo "No colorku-lambda/, skipping"; exit 0; fi

        TABLE_NAME=rick-colorku-board
        FN_NAME=rick-colorku-board
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/rick-portfolio-lambda-role"

        # 1) DynamoDB table (idempotent)
        aws dynamodb create-table \
          --table-name $TABLE_NAME \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --region ${{ env.AWS_REGION }} 2>/dev/null && \
          aws dynamodb wait table-exists --table-name $TABLE_NAME --region ${{ env.AWS_REGION }} || \
          echo "Table already exists"

        # 2) Let the existing lambda role read/write this one table
        aws iam put-role-policy \
          --role-name rick-portfolio-lambda-role \
          --policy-name colorku-board-dynamodb \
          --policy-document '{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": ["dynamodb:GetItem", "dynamodb:PutItem"],
              "Resource": "arn:aws:dynamodb:${{ env.AWS_REGION }}:'${ACCOUNT_ID}':table/'$TABLE_NAME'"
            }]
          }'

        # 3) Lambda (no deps — AWS SDK v3 ships with the runtime)
        cd colorku-lambda
        zip -r deployment.zip colorku.mjs

        if aws lambda get-function --function-name $FN_NAME --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
          aws lambda update-function-code --function-name $FN_NAME \
            --zip-file fileb://deployment.zip --region ${{ env.AWS_REGION }}
        else
          aws lambda create-function \
            --function-name $FN_NAME \
            --runtime nodejs20.x \
            --role $ROLE_ARN \
            --handler colorku.handler \
            --zip-file fileb://deployment.zip \
            --timeout 10 \
            --region ${{ env.AWS_REGION }}
        fi

        aws lambda wait function-updated --function-name $FN_NAME --region ${{ env.AWS_REGION }}

        aws lambda update-function-configuration \
          --function-name $FN_NAME \
          --environment "Variables={TABLE_NAME=$TABLE_NAME}" \
          --region ${{ env.AWS_REGION }}
        aws lambda wait function-updated --function-name $FN_NAME --region ${{ env.AWS_REGION }}

        # 4) Public function URL (idempotent) + open invoke permission for it
        aws lambda create-function-url-config \
          --function-name $FN_NAME \
          --auth-type NONE \
          --cors 'AllowOrigins=*,AllowMethods=*,AllowHeaders=content-type' \
          --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Function URL already exists"

        aws lambda add-permission \
          --function-name $FN_NAME \
          --statement-id FunctionURLAllowPublicAccess \
          --action lambda:InvokeFunctionUrl \
          --principal "*" \
          --function-url-auth-type NONE \
          --region ${{ env.AWS_REGION }} 2>/dev/null || echo "URL permission already set"

        BOARD_URL=$(aws lambda get-function-url-config \
          --function-name $FN_NAME --region ${{ env.AWS_REGION }} \
          --query 'FunctionUrl' --output text)
        echo "Colorku board URL: $BOARD_URL"

        # 5) Publish the URL where the app discovers it
        echo "{\"boardUrl\": \"$BOARD_URL\"}" > config.json
        aws s3 cp config.json s3://${{ env.S3_BUCKET }}/colorku/config.json \
          --content-type "application/json" --cache-control "no-cache"

        echo "✅ Colorku shared board deployed"

    - name: Build and deploy Lambda function
      run: |
        # Navigate to lambda directory
        cd lambda
        
        # Install production dependencies
        npm ci --omit=dev
        
        # Create deployment package
        zip -r deployment.zip contact.js package.json node_modules/
        
        # Try to update function, create if it doesn't exist
        if aws lambda get-function --function-name ${{ env.LAMBDA_FUNCTION_NAME }} --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
          echo "Updating existing Lambda function..."
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://deployment.zip \
            --region ${{ env.AWS_REGION }}
        else
          echo "Creating new Lambda function..."
          
          # Get account ID for role ARN
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/rick-portfolio-lambda-role"
          
          # Create IAM role if it doesn't exist
          if ! aws iam get-role --role-name rick-portfolio-lambda-role >/dev/null 2>&1; then
            echo "Creating IAM role..."
            aws iam create-role \
              --role-name rick-portfolio-lambda-role \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": {
                      "Service": "lambda.amazonaws.com"
                    },
                    "Action": "sts:AssumeRole"
                  }
                ]
              }'
            
            aws iam attach-role-policy \
              --role-name rick-portfolio-lambda-role \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            
            # Wait for role to propagate
            sleep 15
          fi
          
          # Create Lambda function
          aws lambda create-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --runtime nodejs18.x \
            --role $ROLE_ARN \
            --handler contact.handler \
            --zip-file fileb://deployment.zip \
            --timeout 30 \
            --region ${{ env.AWS_REGION }}
          
          # Create Function URL
          aws lambda create-function-url-config \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --auth-type NONE \
            --cors AllowCredentials=false,AllowHeaders=content-type,AllowMethods=POST,AllowOrigins=* \
            --region ${{ env.AWS_REGION }}
        fi
        
        echo "✅ Lambda function deployed"

    - name: Wait for Lambda function to finish updating
      run: |
        echo "Waiting for Lambda function to finish updating..."
        aws lambda wait function-updated --function-name ${{ env.LAMBDA_FUNCTION_NAME }} --region ${{ env.AWS_REGION }}
        echo "✅ Lambda function update completed"

    - name: Update Lambda environment variables
      run: |
        # Update environment variables (secrets are handled by GitHub)
        aws lambda update-function-configuration \
          --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
          --environment Variables="{
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }},
            RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }},
            RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }}
          }" \
          --region ${{ env.AWS_REGION }}
        
        echo "✅ Lambda environment variables updated"

    - name: Get Lambda Function URL and update HTML
      run: |
        # Get the Lambda Function URL
        LAMBDA_URL=$(aws lambda get-function-url-config \
          --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
          --region ${{ env.AWS_REGION }} \
          --query 'FunctionUrl' \
          --output text)
        
        echo "Lambda URL: $LAMBDA_URL"
        
        # Update HTML file with Lambda endpoint
        sed -i "s|action=\"/contact\"|action=\"$LAMBDA_URL\"|g" index.html
        
        # Re-upload updated HTML
        aws s3 cp index.html s3://${{ env.S3_BUCKET }}/index.html --content-type "text/html"
        
        echo "✅ HTML updated with Lambda endpoint"

    - name: Invalidate CloudFront cache (if configured)
      run: |
        if [ ! -z "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
          echo "Invalidating CloudFront cache..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache invalidated"
        else
          echo "No CloudFront distribution configured, skipping cache invalidation"
        fi

    - name: Deployment summary
      run: |
        echo "🎉 Deployment Complete!"
        echo "======================"
        
        if [ ! -z "${{ env.CUSTOM_DOMAIN }}" ]; then
          echo "Website URL: https://${{ env.CUSTOM_DOMAIN }}"
          echo "Alternate URL: http://${{ env.S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
        else
          echo "Website URL: http://${{ env.S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
          echo "💡 Tip: Set CUSTOM_DOMAIN environment variable for custom domain support"
        fi
        
        echo "S3 Bucket: ${{ env.S3_BUCKET }}"
        echo "Lambda Function: ${{ env.LAMBDA_FUNCTION_NAME }}"
        echo "Region: ${{ env.AWS_REGION }}"
        echo ""
        echo "✅ Static files deployed"
        echo "✅ Lambda function updated"
        echo "✅ Environment variables configured"
        echo "✅ HTML updated with Lambda endpoint"
        
        if [ ! -z "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
          echo "✅ CloudFront cache invalidated"
        fi