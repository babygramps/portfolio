@import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@500;600;700&display=swap');

.sg-root {
  --paper: #eef1f4;
  --gridline: #c4d2de;
  --ink: #1a232c;
  --blue: #2456a6;
  --blue-deep: #173a6e;
  --red: #c2402a;
  --green: #2e7a4f;
  --muted: #6b7884;
  --panel: #f7f9fa;
  min-height: 100vh;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 23px, rgba(120,150,180,.13) 23px, rgba(120,150,180,.13) 24px),
    repeating-linear-gradient(90deg, transparent, transparent 23px, rgba(120,150,180,.13) 23px, rgba(120,150,180,.13) 24px),
    var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  padding: 28px 20px 56px;
  box-sizing: border-box;
}
.sg-root *, .sg-root *::before, .sg-root *::after { box-sizing: border-box; }

.sg-header { max-width: 980px; margin: 0 auto 22px; border-bottom: 3px solid var(--ink); padding-bottom: 10px;
  display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.sg-title { font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 34px;
  letter-spacing: .06em; text-transform: uppercase; margin: 0; line-height: 1; }
.sg-title small { color: var(--blue); }
.sg-sub { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }

.sg-layout { max-width: 980px; margin: 0 auto; display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 28px; }
@media (max-width: 860px) { .sg-layout { grid-template-columns: 1fr; } }

.sg-board { display: grid; grid-template-columns: repeat(9, 1fr); width: 100%; max-width: 520px;
  border: 3px solid var(--ink); background: #fcfdfe; user-select: none; }
.sg-cell { position: relative; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  border-right: 1px solid var(--gridline); border-bottom: 1px solid var(--gridline);
  transition: background .08s; }
.sg-cell.b-right { border-right: 2px solid var(--ink); }
.sg-cell.b-bottom { border-bottom: 2px solid var(--ink); }
.sg-cell.peer { background: #eaf0f7; }
.sg-cell.same { background: #dde9f6; }
.sg-cell.selected { background: #d3e2f5; box-shadow: inset 0 0 0 2px var(--blue); }
.sg-cell.conflict { background: #f7d9d2; }
.sg-cell.wrong::after { content: ''; position: absolute; inset: 14% auto auto 14%; width: 72%; height: 72%;
  border-bottom: 2.5px solid var(--red); transform: rotate(-45deg) translateY(10px); opacity: .7;
  pointer-events: none; z-index: 3; }
.sg-cell:focus-visible { outline: 3px solid var(--blue); outline-offset: -3px; }

/* colorku discs \u2014 value rendered as a colored "marble" */
.sg-disc { width: 66%; height: 66%; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,.18);
  box-shadow: inset 0 -3px 5px rgba(0,0,0,.22), inset 0 2px 4px rgba(255,255,255,.45);
  pointer-events: none; }
.sg-disc.given { width: 74%; height: 74%;
  box-shadow: inset 0 -3px 5px rgba(0,0,0,.25), inset 0 2px 4px rgba(255,255,255,.45),
    0 0 0 2px rgba(26,35,44,.30); }

.sg-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; max-width: 520px; }
.sg-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 14px; max-width: 520px; }
.sg-btn { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: .04em;
  padding: 9px 14px; border: 2px solid var(--ink); background: #fcfdfe; color: var(--ink); cursor: pointer;
  transition: background .1s, transform .05s; }
.sg-btn:hover { background: #e8eef5; }
.sg-btn:active { transform: translateY(1px); }
.sg-btn.primary { background: var(--blue-deep); border-color: var(--blue-deep); color: #fff; }
.sg-btn.primary:hover { background: var(--blue); }
.sg-btn:disabled { opacity: .45; cursor: default; }
.sg-btn.on { background: var(--ink); color: #fff; }

/* color pad \u2014 a swatch button per value */
.sg-colorbtn { position: relative; padding: 0; aspect-ratio: 1; border: 2px solid var(--ink);
  background: #fcfdfe; display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: transform .05s; }
.sg-colorbtn:active { transform: translateY(1px); }
.sg-colorbtn:disabled { opacity: .45; cursor: default; }
.sg-colorbtn .sw { width: 72%; height: 72%; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,.18);
  box-shadow: inset 0 -3px 5px rgba(0,0,0,.22), inset 0 2px 4px rgba(255,255,255,.45); }
.sg-colorbtn .lbl { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: clamp(15px, 3vw, 22px); color: #fff; font-weight: 700; line-height: 1;
  text-shadow: 0 1px 2px rgba(0,0,0,.55), 0 0 3px rgba(0,0,0,.4); pointer-events: none; }
.sg-colorbtn.done .sw { opacity: .28; }
.sg-colorbtn.done .lbl { color: var(--muted); text-shadow: none; }
.sg-erase { aspect-ratio: 1; font-size: 18px; }

/* pencil guesses \u2014 semi-transparent color discs, centered like a committed value */
.sg-pencil { display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
  width: 100%; height: 100%; gap: 2px; padding: 8%; box-sizing: border-box; }
.sg-note-disc { border-radius: 50%; opacity: .5; aspect-ratio: 1;
  border: 1px solid rgba(0,0,0,.14);
  height: clamp(13px, 2.6vw, 20px); width: auto; }
.sg-pencil.single .sg-note-disc { height: clamp(22px, 4.4vw, 34px); opacity: .55; }

.sg-panel { border: 2px solid var(--ink); background: var(--panel); }
.sg-panel + .sg-panel { margin-top: 20px; }
.sg-panel-head { font-family: 'Saira Condensed', sans-serif; font-weight: 600; text-transform: uppercase;
  letter-spacing: .1em; font-size: 15px; padding: 8px 14px; background: var(--ink); color: #fff; }
.sg-panel-body { padding: 14px; }

.sg-diff { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.sg-diff .sg-btn.on { background: var(--ink); color: #fff; }

.sg-report { position: relative; }
.sg-row { display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12.5px; padding: 5px 0; border-bottom: 1px dashed var(--gridline); }
.sg-row:last-child { border-bottom: none; }
.sg-row .k { color: var(--muted); letter-spacing: .03em; }
.sg-row .v { font-weight: 600; }
.sg-row .pass { color: var(--green); }
.sg-row .fail { color: var(--red); }
.sg-row .na { color: var(--muted); font-weight: 400; }

.sg-stamp { position: absolute; right: 12px; bottom: 10px; transform: rotate(-9deg);
  font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 19px; letter-spacing: .14em;
  color: var(--green); border: 3px double var(--green); border-radius: 4px; padding: 2px 10px;
  text-transform: uppercase; opacity: .9; pointer-events: none; }
.sg-stamp.bad { color: var(--red); border-color: var(--red); }

.sg-status { margin-top: 12px; font-size: 13px; min-height: 20px; max-width: 520px; }
.sg-status.ok { color: var(--green); font-weight: 600; }
.sg-status.err { color: var(--red); font-weight: 600; }

.sg-checkline { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
  color: var(--muted); letter-spacing: .03em; cursor: pointer; padding: 9px 4px; }
.sg-checkline input { accent-color: var(--blue-deep); }

@media (prefers-reduced-motion: reduce) { .sg-root * { transition: none !important; } }

/* ---------- print layout ---------- */
.sg-print { display: none; }
@media print {
  .sg-root { display: none !important; }
  .sg-print { display: block; font-family: 'IBM Plex Mono', monospace; color: #000; padding: 0; }
  @page { margin: 1.5cm; }
}
.sgp-head { display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 3px solid #000; padding-bottom: 6px; margin-bottom: 4mm; }
.sgp-title { font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 20pt;
  letter-spacing: .06em; text-transform: uppercase; margin: 0; }
.sgp-meta { font-size: 9pt; text-align: right; line-height: 1.5; }
.sgp-board { display: grid; grid-template-columns: repeat(9, 1fr); width: 15cm; height: 15cm;
  border: 1mm solid #000; margin: 6mm auto 0; }
.sgp-cell { display: flex; align-items: center; justify-content: center; font-size: 20pt; font-weight: 600;
  border-right: 0.2mm solid #888; border-bottom: 0.2mm solid #888; }
.sgp-cell.b-right { border-right: 0.6mm solid #000; }
.sgp-cell.b-bottom { border-bottom: 0.6mm solid #000; }
.sgp-cell:nth-child(9n) { border-right: none; }
.sgp-foot { text-align: center; font-size: 8pt; color: #444; margin-top: 5mm; letter-spacing: .04em; }
.sgp-key { page-break-before: always; }
.sgp-key .sgp-board { width: 9cm; height: 9cm; }
.sgp-key .sgp-cell { font-size: 11pt; font-weight: 400; }
.sgp-key .sgp-cell.given { font-weight: 700; }
